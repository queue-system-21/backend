services:
  backend:
    build: .
    ports:
      - $PORT:$PORT
    env_file:
      - .env
    depends_on:
      - db
  db:
    image: postgres:18.3-alpine
    ports:
      - $DB_PORT:5432
    environment:
      - POSTGRES_USER=$DB_USER
      - POSTGRES_PASSWORD=$DB_PASSWORD
      - POSTGRES_DB=$DB_NAME